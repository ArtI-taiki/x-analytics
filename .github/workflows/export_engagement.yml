name: Export Engagement CSV

on:
  schedule:
    - cron: '30 23 * * 0'  # 毎週月曜 08:30 JST = 日曜 23:30 UTC
  workflow_dispatch: # 手動実行も可能

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install gspread google-auth

      - name: Export engagement data
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
        run: python export_for_actions.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/engagement.csv
          git diff --staged --quiet && echo "No changes" || (git commit -m "Update engagement data $(date +%Y-%m-%d)" && git push)
